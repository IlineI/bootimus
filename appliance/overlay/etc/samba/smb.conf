# Read-only SMB share of the bootimus ISO directory.
#
# Purpose: Windows installers (when PXE-booted via wimboot) frequently want
# to fetch install.wim / install.esd / sources/ from a UNC path during setup.
# Serving the ISO extract directory as \\BOOTIMUS\isos lets WIM-based installs
# complete without additional infrastructure.
#
# Guest-only, read-only — the shared data is the same ISOs the admin UI
# already serves publicly over HTTP, so no extra auth surface.

[global]
    workgroup = WORKGROUP
    server string = Bootimus Appliance
    netbios name = BOOTIMUS
    security = user
    map to guest = Bad User
    guest account = nobody
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes
    log file = /var/log/samba/log.%m
    max log size = 1000
    log level = 1
    # SMB1 is off by default; enable only if you hit ancient installers that
    # can't speak SMB2+ (NT4-era stuff; very rare in 2026).
    server min protocol = SMB2

[isos]
    comment = Bootimus ISO library (read-only)
    path = /var/lib/bootimus/isos
    browseable = yes
    read only = yes
    guest ok = yes
    guest only = yes
    create mask = 0644
    directory mask = 0755
